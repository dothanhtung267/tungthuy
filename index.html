<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,
body{
    width:100%;
    min-height:100%;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#d1d1d1;
    font-family:'Cormorant Garamond',serif;
    color:#111;
    overflow-x:hidden;
}

/* Intro Screen */

.intro-screen{
    position:fixed;
    inset:0;
    background:white;

    display:flex;
    justify-content:center;
    align-items:center;

    z-index:9999;

    animation:introExit .9s ease forwards;
    animation-delay:2s;
}

.intro-logo{
    font-family:'Cormorant Garamond',serif;
    font-size:clamp(36px,5vw,64px);
    font-weight:300;
    letter-spacing:.35em;
    text-transform:uppercase;

    opacity:0;
    transform:translateY(20px);

    animation:introReveal 1.2s ease forwards;
}

@keyframes introReveal{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes introExit{
    to{
        opacity:0;
        visibility:hidden;
        pointer-events:none;
    }
}

/* Card */

.card{
    position:relative;

    width:min(520px,88vw);
    height:min(760px,92vh);

    opacity:0;
    transform:translateY(16px);
    animation:cardReveal .9s ease forwards;
    animation-delay:2.15s;

    background-image:
        linear-gradient(
            rgba(255,255,255,.82),
            rgba(255,255,255,.82)
        ),
        url('https://st2.depositphotos.com/1032577/5536/i/450/depositphotos_55361659-White-watercolor-paper-texture.jpg');

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    padding:
        clamp(36px,5vh,60px)
        clamp(34px,5vw,58px);

    box-shadow:
        0 20px 50px rgba(0,0,0,.12);

    overflow:hidden;
}

@keyframes cardReveal{
    from{
        opacity:0;
        transform:translateY(16px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.content{
    position:relative;
    height:100%;
    display:flex;
    flex-direction:column;
}

/* Text Animation */

.fade-item{
    opacity:0;
    transform:translateY(12px);
    animation:fadeInUp .7s ease forwards;
}

@keyframes fadeInUp{
    from{
        opacity:0;
        transform:translateY(12px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Header */

.intro{
    margin-top:6%;
    text-transform:uppercase;
    letter-spacing:.24em;
    font-size:15px;
    line-height:1.8;
    animation-delay:2.35s;
}

.names{
    margin-top:34px;
    font-weight:300;
    font-size:clamp(44px,6vw,68px);
    letter-spacing:.10em;
    line-height:.95;
    animation-delay:2.53s;
}

.ampersand{
    font-size:.58em;
    vertical-align:0.12em;
    letter-spacing:0;
    opacity:.8;
}

/* Details */

.details{
    margin-top:auto;
    text-align:right;
    line-height:1.35;
}

.event-one{
    animation-delay:2.71s;
}

.event-two{
    animation-delay:3.03s;
}

.date{
    font-family:'Montserrat',sans-serif;
    font-size:clamp(24px,3.2vw,34px);
    font-weight:200;
    letter-spacing:.12em;
}

.description{
    margin-top:10px;
    font-size:clamp(14px,1.6vw,17px);
    letter-spacing:.04em;
    opacity:.72;
}

.venue{
    margin-top:4px;
    font-size:clamp(20px,2.4vw,26px);
    font-weight:400;
    letter-spacing:.015em;
}

.divider{
    width:100px;
    height:1px;
    background:rgba(0,0,0,.18);
    margin:30px 0 34px auto;
    opacity:0;
    animation:fadeInUp .7s ease forwards;
    animation-delay:2.89s;
}

.note{
    margin-top:34px;
    font-size:17px;
    font-style:italic;
    opacity:0;
    animation:fadeInUp .7s ease forwards;
    animation-delay:3.19s;
}

/* Responsive */

@media(max-width:768px){

    body{
        overflow:auto;
        padding:32px 20px;
        min-height:100%;
    }

    .card{
        width:90vw;
        height:auto;
        min-height:760px;
        padding:48px 32px;
    }

    .intro{
        margin-top:8%;
        font-size:14px;
    }

    .names{
        font-size:54px;
    }

    .details{
        margin-top:100px;
    }

    .date{
        font-size:30px;
    }

    .venue{
        font-size:23px;
    }
}

@media(max-width:480px){

    .card{
        width:92vw;
        min-height:720px;
    }

    .intro-logo{
        font-size:30px;
        letter-spacing:.22em;
    }

    .intro{
        font-size:13px;
        letter-spacing:.20em;
    }

    .names{
        font-size:44px;
    }

    .details{
        margin-top:80px;
    }

    .date{
        font-size:24px;
    }

    .description{
        font-size:15px;
    }

    .venue{
        font-size:20px;
    }

    .note{
        font-size:16px;
    }
}

@media(max-height:760px) and (min-width:769px){

    .card{
        height:92vh;
        width:min(480px,86vw);
        padding:34px 48px;
    }

    .intro{
        margin-top:4%;
        font-size:14px;
    }

    .names{
        margin-top:28px;
        font-size:56px;
    }

    .date{
        font-size:28px;
    }

    .venue{
        font-size:22px;
    }

    .divider{
        margin:24px 0 28px auto;
    }

    .note{
        margin-top:28px;
        font-size:16px;
    }
}

@media (orientation: landscape) and (max-width:1024px){

    body{
        overflow-y:auto;
        align-items:flex-start;
        padding:20px;
    }

    .card{
        height:auto;
        min-height:720px;
        margin:20px auto;
    }

}

</style>

</div>

        </div>

        <div class="names fade-item">

            Thuy
        </div>

        <div class="details">

            <div class="event fade-item event-one">
                <div class="date">14.11.26</div>
                <div class="description">Intimate Wedding</div>
                <div class="venue">JW Marriott, HCMC</div>
            </div>

            <div class="divider"></div>

            <div class="event fade-item event-two">
                <div class="date">12.12.26</div>
                <div class="description">Traditional Vietnamese Wedding</div>
                <div class="venue">Venue to be confirmed, Hanoi</div>
            </div>

            <div class="note">
                Formal invitation to follow
            </div>

        </div>

    </div>

</div>
